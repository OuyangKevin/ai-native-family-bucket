server.port: 8083

spring.application.name: ai-native-mcp-client

# DashScope 配置 (OpenAI 兼容模式)
spring.ai.openai.api-key: sk-sp-******
spring.ai.openai.base-url: https://coding.dashscope.aliyuncs.com
spring.ai.openai.chat.options.model: glm-5
spring.ai.openai.chat.options.temperature: 0.7

# MCP Client 配置
spring.ai.mcp.client.enabled: true
spring.ai.mcp.client.name: ai-native-mcp-client
spring.ai.mcp.client.version: 1.0.0
spring.ai.mcp.client.request-timeout: 30s
spring.ai.mcp.client.type: SYNC

spring.ai.mcp.client.toolcallback.enabled: true
spring.ai.mcp.client.sse.connections.mcp-server.url: http://localhost:8082

management.endpoints.web.exposure.include: health,info
management.endpoint.health.show-details: always

logging.level.io.modelcontextprotocol: WARN
